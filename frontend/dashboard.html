<!DOCTYPE html>
<html lang="en">

  <head>
    
    <meta charset="UTF-8">
    <title>CoreInventory Dashboard</title>
    <link rel="stylesheet" href="../static/css/style.css">
    
    <style>
    body{
        font-family: Arial;
        margin:0;
        background: linear-gradient(135deg,#6a7bd2,#7f53ac);
    }
    
    /* Cards */
    
    .cards{
        display:flex;
        gap:30px;
        justify-content:center;
        margin-bottom:40px;
    }

    .card{
        background:white;
        padding:40px;
        border-radius:12px;
        width:300px;
        text-align:center;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }
    
    .card h3{
        margin-top:15px;
    }
    
    .card p{
        color:#666;
        font-size:14px;
    }
    
    .icon{
        font-size:30px;
        background:#e8edff;
        color:#5a6cf0;
        padding:15px;
        border-radius:50%;
        display:inline-block;
    }

    </style>
  </head>

    <body>
        <div class="container">
            <div class="toolbar">
                <a href="dashboard.html">Dashboard</a>
                <a href="operation.html">Operation</a>
                <a href="stock.html">Stock</a>
                <a href="move_history.html">Move History</a>
                <a href="settings.html">Settings</a>
            </div>
        
                <h1 style="text-align:center;color:white;margin-bottom:40px;"> 
                    CoreInventory
                </h1>
        
            <!-- Dashboard Cards -->
            <div class="cards">
                <a href="receipt.html" style="text-decoration: none; color: inherit;">
                <div class="card">
                <div class="icon">📥</div>
                <h3>Receipt</h3>
               <p>Receive stock for products.</p>
            </div>
            </a>
            
            <a href="delivery.html" style="text-decoration: none; color: inherit;">
            <div class="card">
                <div class="icon">📤</div>
                <h3>Delivery</h3>
                <p>Deliver stock from inventory.</p>
            </div>
            </a>
        </div>
        <script src="../static/js/script.js"></script>
    </body>
</html>
