<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoreInventory - Receipts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<style>
    :root {
        --luxury-navy: #0f1419;
        --luxury-navy-light: #1a2332;
        --luxury-navy-lighter: #2a3441;
        --luxury-gold: #fbbf24;
        --luxury-gold-light: rgba(251, 191, 36, 0.1);
        --luxury-gold-accent: rgba(251, 191, 36, 0.6);
        --text-primary: #ffffff;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --bg-gradient: linear-gradient(135deg, #0f1419 0%, #1a2332 50%, #2a3441 100%);
        --card-bg: rgba(255, 255, 255, 0.05);
        --card-border: rgba(251, 191, 36, 0.2);
        --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        --shadow-gold: 0 0 20px rgba(251, 191, 36, 0.3);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        background: var(--bg-gradient);
        min-height: 100vh;
        padding: 2rem;
        position: relative;
        overflow: hidden;
        color: var(--text-primary);
    }

    body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
            radial-gradient(circle at 20% 80%, rgba(251, 191, 36, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 50%),
            radial-gradient(circle at 40% 40%, rgba(251, 191, 36, 0.08) 0%, transparent 50%);
        animation: float 20s ease-in-out infinite;
        z-index: -1;
    }

    body::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent 30%, rgba(251, 191, 36, 0.02) 50%, transparent 70%);
        animation: shimmer 8s ease-in-out infinite;
        z-index: -1;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        33% { transform: translateY(-10px) rotate(1deg); }
        66% { transform: translateY(10px) rotate(-1deg); }
    }

    @keyframes shimmer {
        0%, 100% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
        50% { transform: translateX(100%) translateY(100%) rotate(180deg); }
    }

    .app {
        display: flex;
        min-height: 100vh;
        gap: 1.5rem;
    }

    .sidebar {
        width: 260px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 1.5rem 1.25rem;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .sidebar-brand {
        margin-bottom: 1.5rem;
    }

    .sidebar .logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--luxury-gold);
        text-shadow: 0 0 10px rgba(251, 191, 36, 0.35);
    }

    .sidebar .logo svg {
        width: 32px;
        height: 32px;
        color: var(--luxury-gold);
        filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6));
    }

    .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
    }

    .sidebar-link {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text-secondary);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        text-align: left;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .sidebar-link:hover {
        background: rgba(251, 191, 36, 0.1);
        border-color: rgba(251, 191, 36, 0.2);
    }

    .sidebar-link.active {
        background: rgba(251, 191, 36, 0.18);
        border-color: rgba(251, 191, 36, 0.3);
        color: var(--text-primary);
    }

    .sidebar-footer {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .user-badge {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 0.9rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
    }

    .user-label {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.05em;
    }

    .user-email {
        font-weight: 700;
        color: var(--text-primary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .sidebar-footer-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text-secondary);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
    }

    .sidebar-footer-btn:hover {
        background: rgba(251, 191, 36, 0.1);
        border-color: rgba(251, 191, 36, 0.25);
        color: var(--text-primary);
    }

    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    .topbar-left h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 0.25rem;
    }

    .subtitle {
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    .page-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        margin-top: 1rem;
    }

    .page-nav button {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--text-secondary);
        border-radius: 12px;
        padding: 0.5rem 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .page-nav button.active {
        background: rgba(251, 191, 36, 0.18);
        border-color: rgba(251, 191, 36, 0.3);
        color: var(--text-primary);
    }

    .page-nav button:hover {
        background: rgba(251, 191, 36, 0.08);
    }

    .topbar-right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .search {
        position: relative;
        display: inline-flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 0.5rem 0.75rem;
        width: 280px;
        transition: border-color 0.2s ease;
    }

    .search:focus-within {
        border-color: rgba(251, 191, 36, 0.4);
    }

    .search input {
        border: none;
        outline: none;
        background: transparent;
        color: var(--text-primary);
        width: 100%;
        font-size: 0.95rem;
    }

    .search-icon {
        margin-left: 0.5rem;
        color: var(--text-secondary);
    }

    .primary-btn {
        background: linear-gradient(135deg, var(--luxury-gold), #f59e0b);
        color: var(--luxury-navy);
        border: none;
        border-radius: 14px;
        padding: 0.75rem 1.25rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(251, 191, 36, 0.3);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(251, 191, 36, 0.35);
    }

    .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 1.5rem;
    }

    .card + .card {
        margin-top: 1.5rem;
    }

    .card-title {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 1rem;
    }

    .filters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
        padding: 1.25rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        box-shadow: var(--shadow);
    }

    .filter {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
    }

    .filter label {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--text-secondary);
    }

    .filter select,
    .filter input {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 0.6rem 0.9rem;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
        outline: none;
        transition: border-color 0.2s ease;
    }

    .filter select:focus,
    .filter input:focus {
        border-color: rgba(251, 191, 36, 0.4);
    }

    .list-view {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 1.5rem;
    }

    .table-wrap {
        overflow-x: auto;
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 850px;
    }

    .data-table th,
    .data-table td {
        padding: 0.95rem 1rem;
        text-align: left;
    }

    .data-table th {
        font-size: 0.85rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .data-table tbody tr {
        transition: background 0.2s ease;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .data-table tbody tr:hover {
        background: rgba(251, 191, 36, 0.08);
    }

    .data-table td {
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    .type-cell {
        text-transform: capitalize;
        font-weight: 700;
    }

    .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.25rem 0.65rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .status-draft { background: rgba(255, 255, 255, 0.15); color: var(--text-secondary); }
    .status-waiting { background: rgba(251, 191, 36, 0.15); color: var(--luxury-gold); }
    .status-ready { background: rgba(49, 180, 255, 0.15); color: #7ee3ff; }
    .status-done { background: rgba(34, 197, 94, 0.15); color: #bef264; }
    .status-canceled { background: rgba(239, 68, 68, 0.15); color: #f87171; }

    .empty {
        padding: 2.5rem;
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
    }

    .modal {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 20, 25, 0.75);
        padding: 2rem;
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, visibility 0.2s ease;
        z-index: 50;
    }

    .modal.active {
        visibility: visible;
        opacity: 1;
        pointer-events: auto;
    }

    .modal-content {
        width: min(760px, 100%);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 20px;
        padding: 2rem;
        box-shadow: var(--shadow);
        position: relative;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
    }

    .modal-content h2 {
        font-size: 1.75rem;
        margin-bottom: 1rem;
        color: var(--text-primary);
    }

    .modal-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
    }

    .field input,
    .field select {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 0.7rem 0.9rem;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
        outline: none;
        transition: border-color 0.2s ease;
    }

    .field input:focus,
    .field select:focus {
        border-color: rgba(251, 191, 36, 0.4);
    }

    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        margin-top: 1.5rem;
    }

    .secondary-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 0.75rem 1.25rem;
        color: var(--text-secondary);
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .secondary-btn:hover {
        background: rgba(251, 191, 36, 0.08);
        border-color: rgba(251, 191, 36, 0.15);
        color: var(--text-primary);
    }

    .footer {
        padding: 1rem 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.9rem;
    }

    @media (max-width: 1024px) {
        .app { flex-direction: column; }
        .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: space-between; padding: 1rem; }
        .sidebar-nav { flex-direction: row; flex-wrap: wrap; gap: 0.5rem; }
        .sidebar-link { flex: 1 1 45%; }
    }

    @media (max-width: 768px) {
        .search { width: 100%; }
        .topbar { flex-direction: column; align-items: flex-start; gap: 1rem; }
        .topbar-right { width: 100%; justify-content: space-between; }
    }
</style>

<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 11.5V6.75C4 5.23122 5.23122 4 6.75 4H17.25C18.7688 4 20 5.23122 20 6.75V17.25C20 18.7688 18.7688 20 17.25 20H6.75C5.23122 20 4 18.7688 4 17.25V13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 10H16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M8 14H12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <span>CoreInventory</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="sidebar-link" data-section="dashboard">Dashboard</button>
                <button class="sidebar-link active" data-section="receipts">Receipts</button>
                <button class="sidebar-link" data-section="products">Products</button>
                <button class="sidebar-link" data-section="delivery">Delivery Orders</button>
                <button class="sidebar-link" data-section="adjustments">Inventory Adjustment</button>
                <button class="sidebar-link" data-section="moves">Move History</button>
                <button class="sidebar-link" data-section="settings">Settings</button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-badge">
                    <div class="user-label">Signed in as</div>
                    <div class="user-email" id="userEmail">—</div>
                </div>
                <button class="sidebar-footer-btn" id="profileBtn">My Profile</button>
                <button class="sidebar-footer-btn logout-btn" id="logoutBtn">Logout</button>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <h1 id="pageTitle">Receipts</h1>
                    <p class="subtitle">Create and track incoming stock operations.</p>
                    <div class="page-nav">
                        <button class="nav-btn active" data-section="dashboard">Dashboard</button>
                        <button class="nav-btn" data-section="receipts">Receipts</button>
                        <button class="nav-btn" data-section="products">Products</button>
                        <button class="nav-btn" data-section="delivery">Delivery Orders</button>
                        <button class="nav-btn" data-section="adjustments">Inventory Adjustment</button>
                        <button class="nav-btn" data-section="moves">Move History</button>
                        <button class="nav-btn" data-section="settings">Settings</button>
                    </div>
                </div>
                <div class="topbar-right">
                    <div class="search">
                        <input id="searchInput" type="text" placeholder="Search by operation ID" />
                        <span class="search-icon">🔍</span>
                    </div>
                    <button class="primary-btn" id="createBtn">+ New</button>
                </div>
            </header>

            <section class="filters" id="filters">
                <div class="filter">
                    <label for="filterStatus">Status</label>
                    <select id="filterStatus">
                        <option value="">All</option>
                        <option value="draft">Draft</option>
                        <option value="waiting">Waiting</option>
                        <option value="ready">Ready</option>
                        <option value="done">Done</option>
                        <option value="canceled">Canceled</option>
                    </select>
                </div>
                <div class="filter">
                    <label for="filterWarehouse">Warehouse</label>
                    <select id="filterWarehouse">
                        <option value="">All</option>
                        <option value="WH/Stock1">WH/Stock1</option>
                        <option value="WH/Stock2">WH/Stock2</option>
                        <option value="WH/Stock3">WH/Stock3</option>
                    </select>
                </div>
            </section>

            <section class="list-view">
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Operation ID</th>
                                <th>Warehouse</th>
                                <th>Contact</th>
                                <th>Schedule</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="receiptsTable"></tbody>
                    </table>
                </div>
            </section>

            <footer class="footer">
                <div class="footer-text">Tip: Use the search or filters to find receipts quickly, or click + New to create a new receipt.</div>
            </footer>
        </main>
    </div>

    <div class="modal" id="newReceiptModal" aria-hidden="true">
        <div class="modal-content">
            <h2>New Receipt</h2>
            <div class="modal-grid">
                <div class="field">
                    <label>Warehouse Operation ID</label>
                    <input type="text" id="receiptOpId" readonly />
                </div>
                <div class="field">
                    <label for="receiptWarehouse">Warehouse</label>
                    <select id="receiptWarehouse">
                        <option value="WH/Stock1">WH/Stock1</option>
                        <option value="WH/Stock2">WH/Stock2</option>
                        <option value="WH/Stock3">WH/Stock3</option>
                    </select>
                </div>
                <div class="field">
                    <label for="receiptContact">Contact</label>
                    <input type="text" id="receiptContact" placeholder="Supplier, vendor or partner" />
                </div>
                <div class="field">
                    <label for="receiptSchedule">Schedule Date</label>
                    <input type="date" id="receiptSchedule" />
                </div>
                <div class="field">
                    <label for="receiptStatus">Status</label>
                    <select id="receiptStatus">
                        <option value="draft">Draft</option>
                        <option value="waiting">Waiting</option>
                        <option value="ready">Ready</option>
                        <option value="done">Done</option>
                        <option value="canceled">Canceled</option>
                    </select>
                </div>
            </div>

            <div class="modal-actions">
                <button class="secondary-btn" id="cancelCreate">Cancel</button>
                <button class="primary-btn" id="saveReceipt">Save receipt</button>
            </div>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'login.html';

        const userEmailEl = document.getElementById('userEmail');
        const pageTitleEl = document.getElementById('pageTitle');
        const subtitleEl = document.querySelector('.subtitle');
        const receiptsTable = document.getElementById('receiptsTable');
        const searchInput = document.getElementById('searchInput');
        const filterStatusEl = document.getElementById('filterStatus');
        const filterWarehouseEl = document.getElementById('filterWarehouse');

        const modal = document.getElementById('newReceiptModal');
        const receiptOpIdEl = document.getElementById('receiptOpId');
        const receiptWarehouseEl = document.getElementById('receiptWarehouse');
        const receiptContactEl = document.getElementById('receiptContact');
        const receiptScheduleEl = document.getElementById('receiptSchedule');
        const receiptStatusEl = document.getElementById('receiptStatus');

        userEmailEl.textContent = currentUser.email;

        const sidebarLinks = Array.from(document.querySelectorAll('.sidebar-link'));
        sidebarLinks.forEach(link => link.addEventListener('click', () => navigateTo(link.dataset.section)));

        const navButtons = Array.from(document.querySelectorAll('.page-nav button'));
        navButtons.forEach(btn => btn.addEventListener('click', () => navigateTo(btn.dataset.section)));

        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('profileBtn').addEventListener('click', () => alert('Profile management is coming soon.'));

        document.getElementById('createBtn').addEventListener('click', () => {
            openModal();
        });

        document.getElementById('cancelCreate').addEventListener('click', closeModal);
        document.getElementById('saveReceipt').addEventListener('click', saveReceipt);

        filterStatusEl.addEventListener('change', renderList);
        filterWarehouseEl.addEventListener('change', renderList);
        searchInput.addEventListener('input', renderList);

        let receipts = loadReceipts();
        let receiptNextOp = parseInt(localStorage.getItem('receiptNextOp') || '1', 10);

        function navigateTo(section) {
            if (section === 'dashboard') {
                window.location.href = 'dashboard.html';
                return;
            }
            if (section === 'products') {
                alert('Products page is still under construction.');
                return;
            }
            if (section === 'delivery') {
                alert('Delivery Orders page is still under construction.');
                return;
            }
            if (section === 'adjustments') {
                alert('Inventory Adjustment page is still under construction.');
                return;
            }
            if (section === 'moves') {
                alert('Move History is still under construction.');
                return;
            }
            if (section === 'settings') {
                alert('Settings page is still under construction.');
                return;
            }
            highlightNavigation(section);
        }

        function highlightNavigation(section) {
            sidebarLinks.forEach(link => link.classList.toggle('active', link.dataset.section === section));
            navButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.section === section));
        }

        function loadReceipts() {
            const stored = localStorage.getItem('receipts');
            if (!stored) return [];
            try {
                return JSON.parse(stored);
            } catch {
                return [];
            }
        }

        function saveReceipts() {
            localStorage.setItem('receipts', JSON.stringify(receipts));
        }

        function formatDate(value) {
            const d = new Date(value);
            if (isNaN(d)) return value;
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function renderList() {
            const search = searchInput.value.trim().toLowerCase();
            const status = filterStatusEl.value;
            const warehouse = filterWarehouseEl.value;

            const filtered = receipts.filter(r => {
                const matchesSearch = !search || r.operationId.toLowerCase().includes(search);
                const matchesStatus = !status || r.status === status;
                const matchesWarehouse = !warehouse || r.warehouse === warehouse;
                return matchesSearch && matchesStatus && matchesWarehouse;
            });

            receiptsTable.innerHTML = filtered.map(r => `
                <tr>
                    <td>${r.operationId}</td>
                    <td>${r.warehouse}</td>
                    <td>${r.contact}</td>
                    <td>${formatDate(r.schedule)}</td>
                    <td><span class="status-pill status-${r.status}">${capitalize(r.status)}</span></td>
                </tr>
            `).join('') || `<tr><td colspan="5" class="empty">No receipts match your filters. Create a new receipt to begin.</td></tr>`;
        }

        function openModal() {
            receiptContactEl.value = '';
            receiptScheduleEl.value = new Date().toISOString().split('T')[0];
            receiptStatusEl.value = 'draft';
            const nextId = formatOpId(receiptNextOp);
            receiptOpIdEl.value = nextId;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function formatOpId(num) {
            const padded = String(num).padStart(4, '0');
            return `WH/IN/${padded}`;
        }

        function saveReceipt() {
            const warehouse = receiptWarehouseEl.value;
            const contact = receiptContactEl.value.trim();
            const schedule = receiptScheduleEl.value;
            const status = receiptStatusEl.value;
            const operationId = receiptOpIdEl.value;

            const newReceipt = {
                operationId,
                warehouse,
                contact,
                schedule,
                status,
                createdAt: new Date().toISOString(),
            };

            receipts.unshift(newReceipt);
            receiptNextOp += 1;
            localStorage.setItem('receiptNextOp', String(receiptNextOp));
            saveReceipts();
            closeModal();
            renderList();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        highlightNavigation('receipts');
        renderList();
    </script>
</body>
</html>
