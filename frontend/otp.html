<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory - Enter OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<style>
    :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --secondary: #0ea5e9;
        --accent: #f59e0b;
        --text-dark: #0f172a;
        --text-light: #64748b;
        --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --card: #ffffff;
        --border: rgba(15, 23, 42, 0.08);
        --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        background: var(--bg-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: auto;
    }

    body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
            radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 40% 40%, rgba(120, 119, 198, 0.2) 0%, transparent 50%);
        animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        33% { transform: translateY(-10px) rotate(1deg); }
        66% { transform: translateY(10px) rotate(-1deg); }
    }

    .card {
        width: 100%;
        max-width: 500px;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: var(--shadow);
        background: var(--card);
        padding: 64px;
        position: relative;
        z-index: 1;
    }

    .form h2 {
        font-size: 34px;
        font-weight: 800;
        margin-bottom: 14px;
        color: var(--text-dark);
        text-align: center;
    }

    .form p {
        color: var(--text-light);
        margin-bottom: 32px;
        font-size: 16px;
        line-height: 1.5;
        text-align: center;
    }

    .input-group {
        position: relative;
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--text-dark);
    }

    .input-group input {
        width: 100%;
        padding: 14px 16px;
        font-size: 15px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(245, 247, 255, 0.9);
        transition: all 0.25s ease;
    }

    .input-group input:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.5);
        box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.14);
        background: #ffffff;
        transform: scale(1.02);
    }

    .btn {
        width: 100%;
        padding: 15px 18px;
        font-size: 16px;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        box-shadow: 0 16px 30px rgba(99, 102, 241, 0.25);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        margin-top: 20px;
    }

    .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
    }

    .btn:hover::before {
        left: 100%;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
    }

    .meta {
        text-align: center;
        margin-top: 24px;
        font-size: 15px;
        color: var(--text-light);
    }

    .meta a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
    }

    .message {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: var(--text-light);
    }
</style>

<body>
    <div class="card">
        <form class="form" id="otpForm">
            <h2>Enter OTP</h2>
            <p>Check your email for the 6-digit OTP we sent you.</p>

            <div class="input-group">
                <label for="otp">OTP</label>
                <input id="otp" type="text" placeholder="Enter 6-digit OTP" maxlength="6" required>
            </div>

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <input id="newPassword" type="password" placeholder="Enter new password" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" type="password" placeholder="Confirm new password" required>
            </div>

            <button class="btn" type="submit">Reset Password</button>

            <div class="meta">
                <a href="reset.html">Resend OTP</a> | <a href="login.html">Back to login</a>
            </div>

            <div class="message" id="message"></div>
        </form>
    </div>

    <script>
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const storedOTP = localStorage.getItem('resetOTP');
            const timestamp = localStorage.getItem('otpTimestamp');
            const now = Date.now();

            // Simulate OTP expiration (5 minutes)
            if (timestamp && (now - timestamp) > 300000) {
                document.getElementById('message').innerHTML = '<p style="color: red;">OTP has expired. Please request a new one.</p>';
                return;
            }

            if (otp === storedOTP) {
                if (newPassword === confirmPassword) {
                    // Update user's password in localStorage
                    const resetEmail = localStorage.getItem('resetEmail');
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    const userIndex = users.findIndex(user => user.email === resetEmail);

                    if (userIndex !== -1) {
                        users[userIndex].password = newPassword;
                        localStorage.setItem('users', JSON.stringify(users));
                    }

                    // Clean up
                    localStorage.removeItem('resetOTP');
                    localStorage.removeItem('otpTimestamp');
                    localStorage.removeItem('resetEmail');

                    document.getElementById('message').innerHTML = '<p style="color: green;">Password reset successful! Redirecting to login...</p>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    document.getElementById('message').innerHTML = '<p style="color: red;">Passwords do not match.</p>';
                }
            } else {
                document.getElementById('message').innerHTML = '<p style="color: red;">Invalid OTP. Please try again.</p>';
            }
        });
    </script>
</body>
</html>
