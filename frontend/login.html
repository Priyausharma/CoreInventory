<!DOCTYPE html>
<html>
<head>
<title>CoreInventory Login</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
}

a{
display:block;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>CoreInventory</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<a href="signup.html">Create Account</a>

</div>

</body>
</html>
