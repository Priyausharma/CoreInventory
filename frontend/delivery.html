<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Delivery - CoreInventory</title>

<style>

body{
font-family: Arial;
margin:0;
background: linear-gradient(135deg,#6a7bd2,#7f53ac);
}

.container{
width:80%;
margin:auto;
padding-top:40px;
}

.section{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:white;
margin-bottom:40px;
}

input,select{
padding:8px;
margin:8px;
}

button{
padding:8px 15px;
background:#5a6cf0;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<h1>Product Delivery</h1>

<div class="container">

<div class="section">

<h2>Deliver Product</h2>

<input type="text" id="productName" placeholder="Product Name">
<input type="text" id="sku" placeholder="SKU">
<input type="number" id="qty" placeholder="Quantity to Deliver">

<br><br>

<button onclick="deliverProduct()">Deliver</button>

</div>


<div class="section" style="margin-top:30px;">

<h2>Delivery History</h2>

<table id="deliveryTable">

<tr>
<th>Product</th>
<th>SKU</th>
<th>Delivered Qty</th>
</tr>

</table>

</div>

</div>

<script src="delivery.js"></script>

</body>
</html>
